# Financial Adviser — Docker Compose
#
# TrueNAS SCALE: Apps → Discover Apps → ⋮ (three dots) → Install via YAML,
# paste this file. Or run `docker compose up -d` on any Docker host.
#
# Access:
#   https://<nas-ip>:3443  — TLS via a self-signed certificate (Caddy).
#     The browser will warn once per device; to remove the warning, trust
#     Caddy's root CA (see "Trusting the certificate" in the README).
#   http://<nas-ip>:3001   — redirects to https://<nas-ip>:3443.
#
# Adjust before deploying:
#   1. The host path for /data — must be an existing dataset/directory,
#      owned by the container user (TrueNAS "apps" user):
#        chown -R 568:568 /mnt/tank/apps/financial-adviser
#   2. Host ports 3443/3001 if they are taken.

services:
  financial-adviser:
    image: ghcr.io/alqu-it/financial-adviser:latest
    container_name: financial-adviser
    restart: unless-stopped
    # No published ports — only reachable through Caddy (HTTPS).
    volumes:
      # Holds the SQLite database — point this at a dataset you snapshot.
      - /mnt/tank/apps/financial-adviser:/data
    environment:
      TZ: Europe/Berlin
      # All access is HTTPS now, so the session cookie can be Secure.
      COOKIE_SECURE: "true"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/login"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 15s

  # TLS termination with an auto-generated, auto-renewing self-signed cert,
  # plus an HTTP→HTTPS redirect on the old plain-HTTP port.
  caddy:
    image: caddy:2-alpine
    container_name: financial-adviser-tls
    restart: unless-stopped
    ports:
      - "3443:3443"
      - "3001:3001"
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    volumes:
      # Persists Caddy's local CA so the certificate survives updates —
      # trust it once per device and it stays trusted.
      - caddy_data:/data
    depends_on:
      - financial-adviser

configs:
  caddyfile:
    content: |
      {
        local_certs
        skip_install_trust
        admin off
      }

      https://:3443 {
        tls internal {
          on_demand
        }
        reverse_proxy financial-adviser:3000
      }

      # Old HTTP port: send everyone to HTTPS.
      http://:3001 {
        redir https://{host}:3443{uri} 308
      }

volumes:
  caddy_data:
